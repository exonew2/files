# Release Workflow
name: Release
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g., 2025.01.1)'
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build-and-release:
    uses: ./.github/workflows/build-iso.yml
    secrets: inherit