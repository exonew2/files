    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a1a2e" stroke-width="0.5"/>
  </pattern>
  <rect width="1280" height="720" fill="url(#grid)"/>
  
  <!-- Fake screenshot thumbnails (mosaic) -->
  
