<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 225" width="400" height="225">
  <rect width="400" height="225" fill="#111118"/>
  
  <!-- Browser chrome -->
  <rect x="0" y="0" width="400" height="28" fill="#1a1a24"/>
  <rect x="0" y="27" width="400" height="1" fill="#2a2a3a"/>
  
  <!-- Window buttons -->
  <circle cx="14" cy="14" r="5" fill="#ff5f57"/>
  <circle cx="30" cy="14" r="5" fill="#febc2e"/>
  <circle cx="46" cy="14" r="5" fill="#28c840"/>
  
  <!-- URL bar -->
  <rect x="70" y="6" width="260" height="16" rx="8" fill="#2a2a3a"/>
  <text x="200" y="17" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#888">localhost:6333/dashboard</text>
  
  <!-- Qdrant header -->
  <rect x="0" y="28" width="400" height="36" fill="#16161f"/>
  <rect x="160" y="38" width="80" height="18" rx="3" fill="#0d7377"/>
  <text x="200" y="51" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#fff" font-weight="bold">Qdrant</text>
  
  <!-- Dashboard stats cards -->
  <rect x="10" y="72" width="90" height="50" rx="6" fill="#1e1e2e" stroke="#2a2a3a" stroke-width="1"/>
  <text x="55" y="88" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#666">Collections</text>
  <text x="55" y="110" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#0d7377" font-weight="bold">3</text>
  
  <rect x="108" y="72" width="90" height="50" rx="6" fill="#1e1e2e" stroke="#2a2a3a" stroke-width="1"/>
  <text x="153" y="88" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#666">Vectors</text>
  <text x="153" y="110" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#0d7377" font-weight="bold">12.4K</text>
  
  <rect x="206" y="72" width="90" height="50" rx="6" fill="#1e1e2e" stroke="#2a2a3a" stroke-width="1"/>
  <text x="251" y="88" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#666">Payload</text>
  <text x="251" y="110" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#0d7377" font-weight="bold">89 MB</text>
  
  <rect x="304" y="72" width="86" height="50" rx="6" fill="#1e1e2e" stroke="#2a2a3a" stroke-width="1"/>
  <text x="347" y="88" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#666">Status</text>
  <text x="347" y="110" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#0d0" font-weight="bold">● Online</text>
  
  <!-- Collections table -->
  <rect x="10" y="130" width="380" height="86" rx="6" fill="#1e1e2e" stroke="#2a2a3a" stroke-width="1"/>
  <rect x="10" y="130" width="380" height="22" rx="6" fill="#181825"/>
  <rect x="10" y="146" width="380" height="6" fill="#181825"/>
  <text x="20" y="145" font-family="sans-serif" font-size="9" fill="#888" font-weight="bold">Collections</text>
  
  <!-- Table header -->
  <rect x="20" y="154" width="120" height="14" rx="2" fill="#2a2a3a"/>
  <text x="28" y="164" font-family="sans-serif" font-size="8" fill="#888">Name</text>
  <rect x="150" y="154" width="60" height="14" rx="2" fill="#2a2a3a"/>
  <text x="158" y="164" font-family="sans-serif" font-size="8" fill="#888">Vectors</text>
  <rect x="220" y="154" width="60" height="14" rx="2" fill="#2a2a3a"/>
  <text x="228" y="164" font-family="sans-serif" font-size="8" fill="#888">Dimension</text>
  <rect x="290" y="154" width="100" height="14" rx="2" fill="#2a2a3a"/>
  <text x="298" y="164" font-family="sans-serif" font-size="8" fill="#888">Distance</text>
  
  <!-- Row 1 -->
  <text x="28" y="183" font-family="monospace" font-size="9" fill="#0d7377" font-weight="bold">ash_knowledge</text>
  <text x="158" y="183" font-family="sans-serif" font-size="9" fill="#ccc">8,320</text>
  <text x="228" y="183" font-family="sans-serif" font-size="9" fill="#ccc">1,536</text>
  <text x="298" y="183" font-family="sans-serif" font-size="9" fill="#ccc">Cosine</text>
  <line x1="20" y1="188" x2="380" y2="188" stroke="#2a2a3a" stroke-width="0.5"/>
  
  <!-- Row 2 -->
  <text x="28" y="198" font-family="monospace" font-size="9" fill="#0d7377">ash_docs</text>
  <text x="158" y="198" font-family="sans-serif" font-size="9" fill="#ccc">3,120</text>
  <text x="228" y="198" font-family="sans-serif" font-size="9" fill="#ccc">768</text>
  <text x="298" y="198" font-family="sans-serif" font-size="9" fill="#ccc">Dot</text>
  <line x1="20" y1="203" x2="380" y2="203" stroke="#2a2a3a" stroke-width="0.5"/>
  
  <!-- Row 3 -->
  <text x="28" y="213" font-family="monospace" font-size="9" fill="#0d7377">ash_embeddings</text>
  <text x="158" y="213" font-family="sans-serif" font-size="9" fill="#ccc">1,024</text>
  <text x="228" y="213" font-family="sans-serif" font-size="9" fill="#ccc">384</text>
  <text x="298" y="213" font-family="sans-serif" font-size="9" fill="#ccc">Euclid</text>
</svg>