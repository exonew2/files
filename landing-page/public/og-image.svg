<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="ogBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D9488"/>
      <stop offset="50%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#115e59"/>
    </linearGradient>
    <linearGradient id="ogBgOverlay" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(0,0,0,0.15)"/>
      <stop offset="50%" stop-color="rgba(0,0,0,0)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.15)"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    </pattern>
    <pattern id="gridFine" width="15" height="15" patternUnits="userSpaceOnUse">
      <path d="M 15 0 L 0 0 0 15" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="0.5"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#ogBg)"/>
  <rect width="1200" height="630" fill="url(#ogBgOverlay)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#gridFine)"/>

  <!-- Diagonal accent stripe -->
  <polygon points="0,630 300,630 1200,200 1200,50" fill="rgba(255,255,255,0.03)"/>
  <polygon points="0,630 200,630 1200,300 1200,150" fill="rgba(255,255,255,0.02)"/>

  <!-- Subtle decorative circles -->
  <circle cx="1050" cy="100" r="200" fill="rgba(255,255,255,0.03)"/>
  <circle cx="1100" cy="50" r="120" fill="rgba(255,255,255,0.02)"/>
  <circle cx="150" cy="530" r="180" fill="rgba(0,0,0,0.04)"/>

  <!-- Icon / Logo mark -->
  <g transform="translate(80, 315)">
    <rect x="-2" y="-60" width="100" height="100" rx="16" fill="rgba(255,255,255,0.12)"/>
    <!-- Stylized ash mark (geometric A made of teal) -->
    <polygon points="48,-96 12,-36 28,-36 48,-76 68,-36 84,-36" fill="rgba(255,255,255,0)"/>
    <!-- Chevron/terminal prompt mark -->
    <path d="M24 -24 L44 -4 L24 16" fill="none" stroke="#fff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M50 16 L74 16" stroke="#fff" stroke-width="6" stroke-linecap="round"/>
  </g>

  <!-- Main title -->
  <text x="220" y="280" fill="#fff" font-family="'Inter', 'SF Pro Display', -apple-system, sans-serif" font-size="64" font-weight="800" letter-spacing="-1">ash</text>
  <text x="330" y="280" fill="rgba(255,255,255,0.6)" font-family="'Inter', 'SF Pro Display', -apple-system, sans-serif" font-size="64" font-weight="300">—</text>
  <text x="400" y="280" fill="#fff" font-family="'Inter', 'SF Pro Display', -apple-system, sans-serif" font-size="64" font-weight="600" letter-spacing="-0.5">Arch Snapshot</text>
  <text x="740" y="280" fill="rgba(255,255,255,0.7)" font-family="'Inter', 'SF Pro Display', -apple-system, sans-serif" font-size="64" font-weight="300">Hypervisor</text>

  <!-- Tagline -->
  <rect x="220" y="300" width="80" height="3" rx="1.5" fill="rgba(255,255,255,0.3)"/>
  <text x="320" y="340" fill="rgba(255,255,255,0.7)" font-family="'Inter', 'SF Pro Display', -apple-system, sans-serif" font-size="20" font-weight="400">Declarative VM snapshots &amp; Qdrant vector search for Arch Linux</text>

  <!-- Bottom bar -->
  <rect x="0" y="600" width="1200" height="30" fill="rgba(0,0,0,0.15)"/>
  <text x="600" y="620" fill="rgba(255,255,255,0.5)" font-family="'Inter', sans-serif" font-size="12" text-anchor="middle">ash-iso · github.com/anomalyco/ash-iso</text>

  <!-- Version badge -->
  <rect x="1020" y="50" width="100" height="30" rx="15" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="1070" y="70" fill="rgba(255,255,255,0.7)" font-family="'Inter', sans-serif" font-size="12" text-anchor="middle" font-weight="500">v0.1.0</text>
</svg>
