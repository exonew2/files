# =============================================================================
# Hyprland Configuration — ash-iso
# =============================================================================
# GPU-specific env vars are auto-detected at boot by gpu-detect.sh
# and sourced from ~/.config/hypr/env/gpu.conf

source = ~/.config/hypr/env/gpu.conf
source = ~/.config/hypr/env/monitor.conf

# -----------------------------------------------------------------------------
# Environment variables
# -----------------------------------------------------------------------------
env = XCURSOR_SIZE,24
env = XCURSOR_THEME,Adwaita
env = XDG_CURRENT_DESKTOP,ash
env = XDG_SESSION_DESKTOP,ash
env = XDG_SESSION_TYPE,wayland
env = GDK_BACKEND,wayland,x11
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_QPA_PLATFORMTHEME,qt5ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = SDL_VIDEODRIVER,wayland
env = _JAVA_AWT_WM_NONREPARENTING,1
env = ELECTRON_OZONE_PLATFORM_HINT,auto
env = NIXOS_OZONE_WL,1
env = GBM_BACKEND,nvidia-drm
env = WLR_DRM_NO_MODIFIERS,1

# -----------------------------------------------------------------------------
# Monitors — auto-detect; manual overrides suppress auto-detect for that output
# -----------------------------------------------------------------------------
monitor = ,preferred,auto,1

# -----------------------------------------------------------------------------
# General
# -----------------------------------------------------------------------------
general {
  layout = dwindle

  gaps_in = 5
  gaps_out = 10
  border_size = 2
  col.active_border = rgba(cba6f7ee) rgba(89b4faee) 45deg
  col.inactive_border = rgba(45475aee)

  cursor_inactive_timeout = 3
  no_cursor_warps = false
  resize_on_border = false
  allow_tearing = false
}

# -----------------------------------------------------------------------------
# Decoration
# -----------------------------------------------------------------------------
decoration {
  rounding = 10
  active_opacity = 1.0
  inactive_opacity = 0.9
  fullscreen_opacity = 1.0

  blur {
    enabled = true
    size = 8
    passes = 3
    new_optimizations = true
    ignore_opacity = false
    xray = true
    contrast = 0.9
    brightness = 1.0
    noise = 0.01
  }

  shadow {
    enabled = true
    range = 12
    render_power = 3
    color = rgba(1e1e2e55)
    color_shadow = rgba(1e1e2e44)
  }
}

# -----------------------------------------------------------------------------
# Animations
# -----------------------------------------------------------------------------
animations {
  enabled = true

  bezier = wind, 0.05, 0.9, 0.1, 1.05
  bezier = winIn, 0.1, 1.0, 0.1, 1.0
  bezier = winOut, 0.0, 0.0, 0.2, 1.0
  bezier = smooth, 0.25, 0.1, 0.25, 1.0
  bezier = overshot, 0.13, 0.99, 0.29, 1.1

  animation = windows, 1, 6, wind, slide
  animation = windowsOut, 1, 5, winOut, slide
  animation = windowsMove, 1, 5, wind, slide
  animation = fade, 1, 8, smooth
  animation = fadeDim, 1, 8, smooth
  animation = workspaces, 1, 6, winOut, slidevert
  animation = border, 1, 8, smooth
  animation = borderangle, 1, 20, smooth, loop
  animation = layers, 1, 8, smooth
}

# -----------------------------------------------------------------------------
# Input
# -----------------------------------------------------------------------------
input {
  kb_layout = us
  kb_variant =
  kb_model =
  kb_options = compose:rctrl
  kb_rules =

  follow_mouse = 1
  mouse_refocus = false

  touchpad {
    natural_scroll = true
    tap-to-click = true
    tap-and-drag = true
    drag-lock = true
    accel_profile = adaptive
    scroll_factor = 0.8
    clickfinger_behavior = true
    disable_while_typing = true
  }

  accel_profile = adaptive
  sensitivity = 0
}

# -----------------------------------------------------------------------------
# Gestures
# -----------------------------------------------------------------------------
gestures {
  workspace_swipe = true
  workspace_swipe_fingers = 3
  workspace_swipe_distance = 300
  workspace_swipe_invert = true
  workspace_swipe_min_speed_to_force = 30
  workspace_swipe_cancel_ratio = 0.3
  workspace_swipe_create_new = true
  workspace_swipe_direction_lock = true
  workspace_swipe_direction_lock_threshold = 10
  workspace_swipe_forever = true
  workspace_swipe_numbered = true
}

# -----------------------------------------------------------------------------
# Misc
# -----------------------------------------------------------------------------
misc {
  disable_autoreload = false
  disable_hyprland_logo = true
  disable_splash_rendering = true
  enable_swallow = true
  swallow_regex = ^(kitty|foot|alacritty)$
  font_family = JetBrains Mono
  focus_on_activate = true
  vfr = true
  vrr = 2
  mouse_move_enables_dpms = true
  key_press_enables_dpms = false
  animate_mouse_windowdragging = false
}

# -----------------------------------------------------------------------------
# Window rules
# -----------------------------------------------------------------------------
# VM helpers — float key dialog windows
windowrulev2 = float, title:^(File Operation Progress)$
windowrulev2 = float, title:^(Confirm to replace files)$
windowrulev2 = float, title:^(Library)+
windowrulev2 = float, class:^(xdg-desktop-portal)
windowrulev2 = float, class:^(file_progress)
windowrulev2 = float, class:^(confirm)
windowrulev2 = float, class:^(dialog)
windowrulev2 = float, class:^(download)
windowrulev2 = float, class:^(notification)
windowrulev2 = float, class:^(error)
windowrulev2 = float, class:^(org.gnome.Calculator)
windowrulev2 = float, class:^(org.gnome.Nautilus) 
windowrulev2 = float, class:^(pavucontrol)
windowrulev2 = float, class:^(blueman-manager)
windowrulev2 = float, class:^(nm-connection-editor)
windowrulev2 = float, class:^(xdg-desktop-portal-gtk)
windowrulev2 = float, title:^(Picture-in-Picture)
windowrulev2 = float, title:^(piper)
windowrulev2 = float, title:^(Volume Control)
windowrulev2 = float, title:^(Authenticate)
windowrulev2 = float, title:^(Authentication)
windowrulev2 = float, title:^(Unlock)
windowrulev2 = float, title:^(Lock)

# Dwindle layout smart splits
windowrulev2 = suppressevent maximize, class:.* 

# Windows that should ignore gaps
windowrulev2 = bordersize 0, floating:1, onscreen:overview
windowrulev2 = noblur, class:^(wofi)$
windowrulev2 = noblur, class:^(rofi)$
windowrulev2 = noblur, class:^(swaync)$
windowrulev2 = noblur, class:^(dunst)$

# Proper handling for dialogs
windowrulev2 = center, class:^(pavucontrol)
windowrulev2 = center, class:^(nm-connection-editor)
windowrulev2 = center, class:^(blueman-manager)
windowrulev2 = center, class:^(xdg-desktop-portal)

# Games — fullscreen
windowrulev2 = fullscreen, class:^(steam)
windowrulev2 = fullscreen, class:^(steam_app)
windowrulev2 = fullscreen, class:^(gamescope)
windowrulev2 = fullscreen, class:^(lutris)

# VSCode / JetBrains special handling
windowrulev2 = opaque, class:^(code)
windowrulev2 = opaque, class:^(jetbrains)

# -----------------------------------------------------------------------------
# Window management bindings
# -----------------------------------------------------------------------------
$mainMod = SUPER

# Launch
bind = $mainMod, Return, exec, kitty
bind = $mainMod, D, exec, wofi --show drun
bind = $mainMod, Space, exec, $HOME/.config/scripts/lsfs_launcher_hook.sh
bind = $mainMod SHIFT, D, exec, wofi --show run
bind = $mainMod, E, exec, nautilus
bind = $mainMod, A, exec, /usr/lib/ash-agent/ash-agent.talk
bind = $mainMod SHIFT, A, exec, /usr/lib/ash-workspace/ash-workspace-organize.sh
bind = $mainMod SHIFT, Space, exec, /usr/lib/ash-launcher/ash-launcher.sh
bind = $mainMod, S, exec, $HOME/.config/scripts/lsfs_launcher_hook.sh
bind = $mainMod, Q, killactive,
bind = $mainMod SHIFT, Q, exit,
bind = $mainMod SHIFT, C, exec, hyprctl reload
bind = $mainMod SHIFT, R, exec, wlogout

# Screenshots
bind = , Print, exec, grim -g "$(slurp)" - | wl-copy
bind = SHIFT, Print, exec, grim - | wl-copy
bind = CTRL, Print, exec, grim -g "$(slurp)" ~/Pictures/Screenshots/$(date +%Y%m%d-%H%M%S).png

# Media keys
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous
bindl = , XF86AudioStop, exec, playerctl stop

# Brightness
bindel = , XF86MonBrightnessUp, exec, brightnessctl s 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl s 5%-

# Lock
bind = $mainMod, L, exec, swaylock
bind = $mainMod SHIFT, L, exec, hyprctl dispatch exit && swaylock
bind = $mainMod, Escape, exec, swaylock

# Movement
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# Layout management
bind = $mainMod, h, split:left,
bind = $mainMod, l, split:right,
bind = $mainMod, k, split:top,
bind = $mainMod, j, split:bottom,
bind = $mainMod, minus, togglesplit,
bind = $mainMod, Tab, cyclenext,
bind = $mainMod, Tab, bringactivetotop,
bind = $mainMod SHIFT, Tab, cyclenext, prev
bind = $mainMod SHIFT, Tab, bringactivetotop, prev

# Workspace switching
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move windows to workspaces
bind = $mainMod SHIFT, 1, movetoworkspacesilent, 1
bind = $mainMod SHIFT, 2, movetoworkspacesilent, 2
bind = $mainMod SHIFT, 3, movetoworkspacesilent, 3
bind = $mainMod SHIFT, 4, movetoworkspacesilent, 4
bind = $mainMod SHIFT, 5, movetoworkspacesilent, 5
bind = $mainMod SHIFT, 6, movetoworkspacesilent, 6
bind = $mainMod SHIFT, 7, movetoworkspacesilent, 7
bind = $mainMod SHIFT, 8, movetoworkspacesilent, 8
bind = $mainMod SHIFT, 9, movetoworkspacesilent, 9
bind = $mainMod SHIFT, 0, movetoworkspacesilent, 10

# Scroll through workspaces
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize with mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Floating toggle
bind = $mainMod, F, togglefloating,
bind = $mainMod SHIFT, F, fullscreen, 1
bind = $mainMod CTRL, F, fullscreen, 0

# Scratchpad
bind = $mainMod, grave, togglespecialworkspace,
bind = $mainMod SHIFT, grave, movetoworkspace, special

# Submap for resize mode
bind = $mainMod, R, submap, resize

submap = resize
bind = , left, resizeactive, -30 0
bind = , right, resizeactive, 30 0
bind = , up, resizeactive, 0 -30
bind = , down, resizeactive, 0 30
bind = , escape, submap, reset
bind = , Return, submap, reset
submap = reset

# -----------------------------------------------------------------------------
# Autostart (exec-once)
# -----------------------------------------------------------------------------
exec-once = dbus-update-activation-environment --systemd --all
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = waybar
exec-once = swaync
exec-once = hyprpaper
exec-once = /usr/lib/iso/hyprland-setup.sh
exec-once = swaylock --daemonize
exec-once = /usr/lib/ash-desktop/ash-agent-start
exec-once = systemctl --user enable --now lsfs-daemon
exec-once = bash -c 'sleep 3 && $HOME/.local/bin/lsfs-query --index "$HOME/.config" 2>/dev/null; $HOME/.local/bin/lsfs-query --index "$HOME/ash-iso/docs" 2>/dev/null'
exec-once = bash ~/ash-iso/scripts/fix-all.sh
