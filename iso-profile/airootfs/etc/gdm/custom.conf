# /etc/gdm/custom.conf
# Ash Desktop GDM Configuration
# Catppuccin Mocha themed

[daemon]
AutomaticLoginEnable=True
AutomaticLogin=aiuser
WaylandEnable=true
DefaultSession=ash-desktop.desktop
InitialSetupEnable=false
Logo=/usr/share/icons/ash-icons/ash-logo.png

[security]
AllowRemoteAutomaticLogin=true

[greeter]
# GDM theme settings
# Catppuccin Mocha background
Background=/usr/share/backgrounds/default.png
DefaultFont=Noto Sans 11
DefaultFaceName=Noto Sans
IncludeAll=true
# Hide user list for privacy
DisableUserList=false
# Enable GDM styling (requires gdm-settings or gnome-shell theme override)
# See /usr/share/ash-desktop/gdm/gdm.css for GTK theme overrides

[debug]
Enable=false

[servicenames]
# Ensure Ash Desktop session is discoverable
DesktopNames=ash-desktop.desktop

[xdmcp]
Enable=false
