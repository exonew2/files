service:
  http_port: 6333
  grpc_port: 6334
  host: 0.0.0.0
  max_request_size: 104857600
  enable_cors: true

storage:
  storage_path: /var/lib/qdrant
  snapshots_path: /var/lib/qdrant/snapshots
  performance:
    max_search_threads: 4
    max_optimization_threads: 2

wal:
  wal_capacity_mb: 32
  wal_flush_interval_ms: 500

log_level: INFO