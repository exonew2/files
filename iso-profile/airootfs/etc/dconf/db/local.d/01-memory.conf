# GNOME memory and performance tuning — /etc/dconf/db/local.d/01-memory.conf
# Applied via `dconf update` at first boot

[org/gnome/desktop/interface]
enable-animations=false
font-antialiasing='grayscale'
font-hinting='slight'
clock-show-seconds=true

[org/gnome/desktop/wm/preferences]
button-layout=':'
num-workspaces=1
visual-bell-type='none'

[org/gnome/desktop/search-providers]
disable-external=true
sort-order=['org.gnome.Settings.desktop','org.gnome.Contacts.desktop','org.gnome.Calculator.desktop']

[org/gnome/desktop/privacy]
disable-microphone=false
disable-camera=false
remember-recent-files=false
recent-files-max-age=0

[org/gnome/desktop/background]
show-desktop-icons=false

[org/gnome/shell]
disable-user-extensions=true
enabled-extensions=[]
disable-extension-version-validation=true

[org/gnome/desktop/thumbnailers]
disable-all=true

[org/gnome/evolution-data-server]
autostart=false

[org/gnome/tracker/miner/files]
enable=false
throttle=0
index-on-battery-first-time=false
index-on-battery=false
index-on-battery-laptops=false

[org/gnome/tracker/miner/files/blacklist]
recursive-directories=['/usr','/opt','/var']

[org/gnome/desktop/session]
idle-delay=uint32 300

[org/gnome/settings-daemon/plugins/color]
active=false

[org/gnome/settings-daemon/plugins/housekeeping]
active=false

[org/gnome/settings-daemon/plugins/power]
idle-dim=false
sleep-display-ac=0
sleep-display-battery=0
power-button-action='nothing'
