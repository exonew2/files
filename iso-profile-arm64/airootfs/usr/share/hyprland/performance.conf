# Hyprland VM performance tuning
# Sourced by hyprland.conf when running in a VM

decoration {
    blur {
        enabled = false
        size = 1
        passes = 0
        ignore_opacity = false
        new_optimizations = true
    }
    shadow {
        enabled = false
    }
    dim_inactive = false
    dim_strength = 0
}

animations {
    enabled = false
}

misc {
    vfr = true
    vrr = 2
    disable_autoreload = true
    disable_hyprland_logo = true
    animate_mouse_windowdragging = false
    enable_swallow = false
    mouse_move_enables_dpms = false
    key_press_enables_dpms = false
}

input {
    kb_options = terminate:ctrl_alt_bks
    follow_mouse = 0
}

xwayland {
    force_zero_scaling = true
    use_nearest_neighbor = true
}

render {
    direct_scanout = true
    explicit_sync = 0
}
