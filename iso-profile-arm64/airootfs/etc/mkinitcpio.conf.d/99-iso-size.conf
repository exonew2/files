# Minimal initramfs for VM boot speed
# Remove fsck (not needed for squashfs/tmpfs root)
# Remove keyboard/keymap (assume en-us in VM; enable if needed)
MODULES=()
BINARIES=()
FILES=()
HOOKS=(base udev autodetect modconf kms block archiso_loop_mnt archiso_pxe_common archiso_pxe_nbd archiso_pxe_http archiso_pxe_nfs filesystems)

# zstd compression for smaller + faster decompress
COMPRESSION="zstd"
COMPRESSION_OPTIONS=(-19 -T0)
