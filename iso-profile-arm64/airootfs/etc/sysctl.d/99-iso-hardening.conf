# /etc/sysctl.d/99-iso-hardening.conf

# ── Kernel Hardening ──────────────────────────────────────────────────

# Restrict kernel pointer exposure (ASLR)
kernel.kptr_restrict = 2

# Restrict dmesg to root
kernel.dmesg_restrict = 1

# Restrict BPF to privileged users
kernel.unprivileged_bpf_disabled = 1

# Harden BPF JIT
net.core.bpf_jit_harden = 2

# Disable kexec (prevents kernel replacement)
kernel.kexec_load_disabled = 1

# Restrict perf events
kernel.perf_event_paranoid = 3
kernel.perf_event_max_sample_rate = 1
kernel.perf_cpu_time_max_percent = 1

# Disable user-space module loading
kernel.modules_disabled = 0

# Restrict kernel module loading to CAP_SYS_MODULE
kernel.module.sig_enforce = 1
kernel.module.sig_hash = sha512

# ASLR
kernel.randomize_va_space = 2

# Restrict ptrace
kernel.yama.ptrace_scope = 2

# Restrict core dumps
fs.suid_dumpable = 0

# Set core dump file location to a directory readable only by root
kernel.core_pattern = |/bin/false

# ── Network Hardening ─────────────────────────────────────────────────

# Disable IP forwarding (unless acting as router)
net.ipv4.ip_forward = 0
net.ipv6.conf.all.forwarding = 0

# Disable source routing
net.ipv4.conf.all.accept_source_route = 0
net.ipv4.conf.default.accept_source_route = 0
net.ipv6.conf.all.accept_source_route = 0
net.ipv6.conf.default.accept_source_route = 0

# Enable TCP SYN cookies (mitigate SYN floods)
net.ipv4.tcp_syncookies = 1
net.ipv4.tcp_syn_retries = 2
net.ipv4.tcp_synack_retries = 2

# Ignore ICMP redirects
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv4.conf.all.secure_redirects = 0
net.ipv4.conf.default.secure_redirects = 0
net.ipv6.conf.all.accept_redirects = 0
net.ipv6.conf.default.accept_redirects = 0

# Ignore send redirects
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0

# Enable RFC-recommended source validation (anti-spoofing)
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1

# Disable IPv4 martian packets
net.ipv4.conf.all.log_martians = 1
net.ipv4.conf.default.log_martians = 1

# Ignore ICMP echo requests to broadcast
net.ipv4.icmp_echo_ignore_broadcasts = 1

# Ignore bogus ICMP errors
net.ipv4.icmp_ignore_bogus_error_responses = 1

# TCP time-wait assassination (prevent connection hijack)
net.ipv4.tcp_rfc1337 = 1

# Reduce connection time-wait
net.ipv4.tcp_fin_timeout = 15

# Set TCP keepalive
net.ipv4.tcp_keepalive_time = 300
net.ipv4.tcp_keepalive_intvl = 15
net.ipv4.tcp_keepalive_probes = 3

# Disable IPv6 router solicitations if not using IPv6
net.ipv6.conf.all.router_solicitations = 0
net.ipv6.conf.default.router_solicitations = 0

# Disable IPv6 temporary address support
net.ipv6.conf.all.use_tempaddr = 0
net.ipv6.conf.default.use_tempaddr = 0

# ── Virtual Memory ────────────────────────────────────────────────────

# Reduce swap tendency
vm.swappiness = 10

# Improve cache pressure
vm.vfs_cache_pressure = 50

# ── Filesystem Hardening ──────────────────────────────────────────────

# Restrict userfaultfd
vm.unprivileged_userfaultfd = 0

# Disable mounting of new filesystem types via user namespaces
# (enabled by default for Docker, but restrict where possible)
kernel.unprivileged_userns_clone = 1

# Restrict overlayfs
kernel.overlayfs_nfs_export = 0
