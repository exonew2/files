flush ruleset

# Rate-limit sets for brute-force protection
table inet filter {
    set ssh_ratelimit {
        type ipv4_addr
        size 65536
        flags dynamic,timeout
        timeout 30s
    }
    set ssh_ratelimit6 {
        type ipv6_addr
        size 65536
        flags dynamic,timeout
        timeout 30s
    }
    set port_scan_detect {
        type ipv4_addr
        size 65536
        flags dynamic,timeout
        timeout 120s
    }
    set port_scan_detect6 {
        type ipv6_addr
        size 65536
        flags dynamic,timeout
        timeout 120s
    }
    set vm_networks {
        type ipv4_addr
        flags interval
        auto-merge
    }
    set banned_ips {
        type ipv4_addr
        flags interval
        auto-merge
    }

    chain input {
        type filter hook input priority filter; policy drop;

        # Loopback - full trust
        iifname "lo" accept

        # Invalid state
        ct state invalid drop

        # Early anti-spoofing
        iifname != "lo" ip daddr 127.0.0.0/8 drop
        iifname != "lo" ip6 daddr ::1 drop
        ip saddr 0.0.0.0/8 drop
        ip saddr 10.0.0.0/8 iifname != "eth0" iifname != "ens*" iifname != "virbr*" drop
        ip saddr 169.254.0.0/16 drop
        ip saddr 172.16.0.0/12 iifname != "eth0" iifname != "ens*" iifname != "virbr*" drop
        ip saddr 192.0.2.0/24 drop
        ip saddr 224.0.0.0/4 drop
        ip saddr 240.0.0.0/4 drop
        ip saddr 255.255.255.255 drop
        ip6 saddr fe80::/10 iifname != "lo" iifname != "eth*" drop

        # Established/Related
        ct state established,related accept

        # Port scan detection
        tcp flags & (fin|syn|rst|psh|ack|urg) == 0 add @port_scan_detect { ip saddr } drop
        tcp flags & (fin|syn|rst|psh|ack|urg) == fin|psh|urg add @port_scan_detect { ip saddr } drop
        tcp flags & (syn|fin) == syn|fin add @port_scan_detect { ip saddr } drop

        # ICMP rate-limited (limit ping floods)
        ip protocol icmp limit rate 10/second accept
        ip protocol icmp drop
        ip6 nexthdr icmpv6 limit rate 10/second accept
        ip6 nexthdr icmpv6 drop

        # DHCP
        udp sport 67 dport 68 accept
        udp sport 68 dport 67 accept

        # SSH with rate limiting (2 connections per 30s per IP)
        tcp dport 22 add @ssh_ratelimit { ip saddr limit rate over 2/minute burst 2 packets } drop
        tcp dport 22 ip saddr @vm_networks accept
        tcp dport 22 ct state new accept

        # VPN/WireGuard
        udp dport 51820 accept

        # mDNS for local discovery
        udp dport 5353 accept

        # VM Networks - Ollama
        ip saddr @vm_networks tcp dport 11434 accept

        # VM Networks - Qdrant HTTP
        ip saddr @vm_networks tcp dport 6333 accept

        # VM Networks - Qdrant gRPC
        ip saddr @vm_networks tcp dport 6334 accept

        # HTTP health endpoint (local only)
        iifname "lo" tcp dport 8080 accept

        # Banned IPs
        ip saddr @banned_ips drop

        # Log dropped (rate-limited)
        limit rate 3/minute log prefix "NFT-DROP: " level info flags tcp sequence
    }

    chain forward {
        type filter hook forward priority filter; policy drop;
        ct state established,related accept
        ct state invalid drop
        ip saddr @vm_networks oifname @vm_networks accept
    }

    chain output {
        type filter hook output priority filter; policy accept;
    }
}

table inet nat {
    chain prerouting {
        type nat hook prerouting priority dstnat; policy accept;
    }
    chain postrouting {
        type nat hook postrouting priority srcnat; policy accept;
        ip saddr 192.168.122.0/24 oifname != "virbr0" masquerade
        ip saddr 10.0.2.0/24 oifname != "eth0" masquerade
    }
}
